<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        
        <header class="main-header">
            <div class="logo">Kişisel Portfolyo</div>
            <nav>
                <ul>
                    <li><a href="index.html">Ana Sayfa</a></li>
                    <li><a href="about.html">Hakkımda</a></li>
                    <li><a href="interests.html">İlgi Alanlarım</a></li>
                    <li><a href="contact.html">İletişim</a></li>
                    <li><a href="flex-lab.html">Flexbox Lab</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="contact-container">
                <h2>Detaylı İletişim Formu</h2>
                
                <form action="#" method="POST" enctype="multipart/form-data">
                    
                    <label for="fullname">Ad Soyad:</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Örn: Vefa Yoksul" required>

                    <label for="email">E-posta Adresi:</label>
                    <input type="email" id="email" name="email" placeholder="ornek@mail.com" required>

                    <label for="password">Başvuru Takip Şifresi:</label>
                    <input type="password" id="password" name="password" placeholder="Şifrenizi girin" required>

                    <label>İletişim Tercihi:</label>
                    <div class="option-group">
                        <label><input type="radio" name="contact_pref" value="email" checked> Bana e-posta ile ulaşın</label>
                        <label><input type="radio" name="contact_pref" value="phone"> Bana telefonla ulaşın</label>
                    </div>

                    <label>İlgi Alanları / Yetenekler:</label>
                    <div class="option-group">
                        <label><input type="checkbox" name="skills" value="html"> HTML</label>
                        <label><input type="checkbox" name="skills" value="css"> CSS</label>
                        <label><input type="checkbox" name="skills" value="algo"> Algoritma</label>
                    </div>

                    <label for="subject">Konu:</label>
                    <select id="subject" name="subject" required>
                        <option value="" disabled selected>Lütfen bir konu seçin...</option>
                        <option value="is_teklifi">İş Teklifi</option>
                        <option value="soru">Soru</option>
                        <option value="geri_bildirim">Geri Bildirim</option>
                    </select>

                    <label for="file_upload">Özgeçmiş (CV) veya Fotoğraf Yükle:</label>
                    <input type="file" id="file_upload" name="file_upload">

                    <label for="message">Mesajınız:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Detaylı mesajınızı buraya yazabilirsiniz..." required></textarea>

                    <div class="button-group">
                        <button type="submit" class="submit-btn">Gönder</button>
                        <button type="reset" class="reset-btn">Temizle</button>
                    </div>
                    
                </form>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 CSS Temel Örnek. Tüm hakları saklıdır.</p>
        </footer>
        
    </div>
</body>
</html>
